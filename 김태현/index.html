<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김태현 - 백엔드 개발자</title>
    <meta name="description" content="컴퓨터 공학과 3학년, 멋쟁이 사자처럼 백엔드 파트 김태현의 소개 페이지입니다.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Pretendard:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="container">
        <header class="fade-in">
            <div class="profile-img-container">
                <div class="profile-glow"></div>
                <div class="profile-img">
                    <!-- 텍스트 이니셜로 대체 (실제 이미지로 나중에 변경 가능) -->
                    <span>TH</span>
                </div>
            </div>
            
            <h1 class="name">김태현 <span class="title">Kim Taehyun</span></h1>
            <p class="role">Backend Developer</p>
        </header>

        <main>
            <section class="info-section slide-up">
                <div class="info-card">
                    <div class="icon">🎓</div>
                    <h3>전공</h3>
                    <p>컴퓨터 공학과</p>
                </div>
                <div class="info-card">
                    <div class="icon">🏫</div>
                    <h3>학년</h3>
                    <p>3학년</p>
                </div>
                <div class="info-card highlight">
                    <div class="icon">🦁</div>
                    <h3>소속</h3>
                    <p>멋쟁이 사자처럼<br/>백엔드 파트</p>
                </div>
            </section>

            <section class="about-section slide-up delay-1">
                <h2>About Me</h2>
                <p>안녕하세요! 튼튼한 인프라와 효율적인 서버 아키텍처에 관심이 많은 백엔드 개발자 김태현입니다. 새로운 기술을 탐구하고, 안정적인 서비스를 구축하는 것을 목표로 끊임없이 성장하고 있습니다.</p>
                
                <div class="skills-container">
                    <span class="skill-tag">Java</span>
                    <span class="skill-tag">Spring Boot</span>
                    <span class="skill-tag">Python</span>
                    <span class="skill-tag">MySQL</span>
                    <span class="skill-tag">JPA</span>
                    <span class="skill-tag">Git</span>
                </div>
            </section>
        </main>

        <footer class="fade-in delay-2">
            <a href="#" class="contact-btn">연락하기</a>
            <p class="copyright">© 2026 Kim Taehyun. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
