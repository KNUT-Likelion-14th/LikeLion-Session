<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임채윤 | 자기소개서</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    
    <main class="container">
        <header class="hero">
            <div class="glass-card profile-card">
                <div class="profile-header">
                    <h1 class="gradient-text">임채윤</h1>
                    <p class="tagline">지속 가능한 코드를 지향하는 개발자</p>
                </div>
                <div class="profile-info">
                    <div class="info-item">
                        <span class="label">나이</span>
                        <span class="value">24세</span>
                    </div>
                    <div class="info-item">
                        <span class="label">학부</span>
                        <span class="value">컴퓨터소프트웨어학과</span>
                    </div>
                    <div class="info-item">
                        <span class="label">관심분야</span>
                        <span class="value">백엔드</span>
                    </div>
                    <div class="info-item">
                        <span class="label">현재 공부 중</span>
                        <span class="value">Spring</span>
                    </div>
                </div>
            </div>
        </header>

        <section class="content">
            <div class="glass-card about-section">
                <h2>소개</h2>
                <p>컴퓨터소프트웨어학과에 재학 중인 24세 임채윤입니다. 기술을 통해 복잡한 문제를 단순하게 해결하는 것에 큰 흥미를 느끼고 있습니다. 항상 새로운 기술에 도전하고, 동료들과 함께 성장하는 과정을 즐깁니다.</p>
            </div>

            <div class="skills-grid">
                <div class="glass-card skill-card">
                    <h3>Backend</h3>
                    <p>Java</p>
                </div>
                <div class="glass-card skill-card">
                    <h3>Tools</h3>
                    <p>Git, VS Code, IntelliJ</p>
                </div>
            </div>
        </section>

        <footer class="contact">
            <div class="glass-card contact-card">
                <p>© 2026 임채윤. All rights reserved.</p>
            </div>
        </footer>
    </main>
</body>
</html>
